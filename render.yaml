# Render Blueprint: https://render.com/docs/blueprint-spec
# rootDir: omit here so the service uses the repository root (Render default). This repo’s package.json is at the repo root.
# If the dashboard "Root Directory" is set to `src`, fix it: https://render.com/docs/monorepo-support#setting-a-root-directory
#
# DATABASE_URL: Supabase Session pooler only — https://supabase.com/docs/guides/database/prisma

services:
  - type: web
    name: rentel-api
    runtime: node
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
