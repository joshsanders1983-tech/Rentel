# Render Web Service — Express app at repo root (no subfolder).
# Root Directory: leave empty. Set DATABASE_URL and ADMIN_PASSWORD in the dashboard.
# Migrations run in preDeploy (after build, before start) — needs DATABASE_URL at deploy time.

services:
  - type: web
    name: rentel-api
    runtime: node
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
