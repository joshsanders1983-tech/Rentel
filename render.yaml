# Render Blueprint — builds the Express API in rental-backend/ from the repo root
# (avoids deploying the Electron desktop app). Set DATABASE_URL + ADMIN_PASSWORD in the dashboard.
#
# Manual Web Service (no Blueprint): same build/start as below; leave "Root Directory" empty.

services:
  - type: web
    name: rentel-api
    runtime: node
    buildCommand: npm run render-build
    startCommand: npm run render-start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
