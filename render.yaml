# Render Web Service — Express app at repo root (no subfolder).
# Set DATABASE_URL and ADMIN_PASSWORD in the dashboard.

services:
  - type: web
    name: rentel-api
    runtime: node
    buildCommand: npm install && npm run build && npm run db:deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
