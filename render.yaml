# Render Web Service — Express app at repo root (no subfolder).
# Root Directory: leave empty (repo root — not "src"). Set DATABASE_URL + ADMIN_PASSWORD in the dashboard.
# DATABASE_URL = Supabase Connect → Session pooler only (IPv4-safe). See .env.example.

services:
  - type: web
    name: rentel-api
    runtime: node
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
